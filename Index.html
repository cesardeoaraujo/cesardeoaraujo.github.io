<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cesar de Araujo | Portfólio em Construção</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a; /* Azul escuro/asfalto moderno */
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            background: rgba(30, 41, 59, 0.7);
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #38bdf8; /* Tom azul claro/cyan */
            font-weight: 700;
        }

        h2 {
            font-size: 1.2rem;
            font-weight: 400;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .status-badge {
            display: inline-block;
            background-color: #1e293b;
            color: #fbbf24; /* Amarelo alerta discreto */
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 25px;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        p {
            font-size: 1.1rem;
            color: #cbd5e1;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .links {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .btn-primary {
            background-color: #38bdf8;
            color: #0f172a;
        }

        .btn-primary:hover {
            background-color: #0ea5e9;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: transparent;
            color: #94a3b8;
            border: 1px solid #334155;
        }

        .btn-secondary:hover {
            color: #f8fafc;
            border-color: #64748b;
            background-color: rgba(51, 65, 85, 0.3);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-badge">Em Construção</div>
        
        <h1>Cesar de Araujo</h1>
        <h2>Systems Architect & SRE</h2>
        
        <p>Estou preparando um espaço para compartilhar meus projetos, artigos e automações. Enquanto o novo portfólio não fica pronto, você pode me encontrar nos canais abaixo:</p>
        
        <div class="links">
            <a href="https://linkedin.com/in/cesardearaujo" target="_blank" class="btn btn-primary">LinkedIn</a>
            <a href="https://github.com/cesardeoaraujo" target="_blank" class="btn btn-secondary">GitHub</a>
        </div>
    </div>

</body>
</html>
